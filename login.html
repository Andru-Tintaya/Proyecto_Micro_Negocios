<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Igual que register pero para login -->
    <title>Acceso Emprendedor | MiZona</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="main.js" defer></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="location.href='index.html'">MiZona</div>
    </nav>

    <div class="login-container">
        <div class="login-card">
            <h2>Panel de Gestión</h2>
            <p>Ingresa para administrar tu negocio.</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email o WhatsApp</label>
                    <input type="text" id="loginIdentifier" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn-enter">Entrar al Panel</button>
            </form>
            
            <p style="text-align: center; margin-top: 20px;">
                ¿Nuevo emprendedor? <a href="register.html">Regístrate gratis</a>
            </p>
        </div>
    </div>
</body>
</html>
