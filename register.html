<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regístrate Gratis | MiZona</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="main.js" defer></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="location.href='index.html'">MiZona</div>
    </nav>

    <div class="login-container">
        <div class="login-card">
            <h2>Únete a MiZona Gratis</h2>
            <p>Registra tu negocio y empieza a recibir clientes hoy.</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="fullName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>WhatsApp (con código)</label>
                    <input type="tel" id="whatsapp" placeholder="+59170000000" required>
                </div>
                <div class="form-group">
                    <label>Nombre de tu Negocio</label>
                    <input type="text" id="businessName" required>
                </div>
                <div class="form-group">
                    <label>Ciudad</label>
                    <select id="city" required>
                        <option value="">Selecciona tu ciudad</option>
                        <option value="Santa Cruz">Santa Cruz</option>
                        <option value="La Paz">La Paz</option>
                        <option value="Cochabamba">Cochabamba</option>
                        <option value="Tarija">Tarija</option>
                        <option value="El Alto">El Alto</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-enter">Crear Cuenta Gratis</button>
            </form>
            
            <p style="text-align: center; margin-top: 20px;">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
            </p>
            <p id="registerMsg" style="color: green; display: none; text-align: center;"></p>
        </div>
    </div>
</body>
</html>
